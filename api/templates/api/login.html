{% extends 'api/base.html' %}
{% block title %}Вход{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 80px auto;">
    <div class="card">
        <h2 style="margin-bottom: 20px;">Вход в систему</h2>

        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Логин</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Войти</button>
</form>

        {% if request.GET.registered %}
            <div class="alert alert-success" style="margin-top:16px;">
                Регистрация успешна! Войдите в систему.
            </div>
        {% endif %}

        <div style="text-align:center; margin-top:16px; color:#666;">
            Нет аккаунта? <a href="/web/register/">Зарегистрироваться</a>
        </div>
    </div>
</div>
{% endblock %}
