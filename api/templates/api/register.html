{% extends 'api/base.html' %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 60px auto;">
    <div class="card">
        <h2 style="margin-bottom: 20px;">Регистрация</h2>

        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Логин *</label>
                <input type="text" name="username" value="{{ form_data.username }}" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" value="{{ form_data.email }}" required>
            </div>
            <div class="form-group">
                <label>Пароль *</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>Повторите пароль *</label>
                <input type="password" name="password_confirm" required>
            </div>
            <div class="form-group">
                <label>Роль *</label>
                <select name="role" required>
                    <option value="student" {% if form_data.role == 'student' %}selected{% endif %}>Студент</option>
                    <option value="teacher" {% if form_data.role == 'teacher' %}selected{% endif %}>Преподаватель</option>
                </select>
            </div>
            <button type="submit" class="btn btn-success" style="width:100%;">Зарегистрироваться</button>
        </form>

        <div style="text-align:center; margin-top:16px; color:#666;">
            Уже есть аккаунт? <a href="/web/login/">Войти</a>
        </div>
    </div>
</div>
{% endblock %}
